<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orçamento</title>
    <style>
      /* =========================================================
     CONFIG VISUAL  (cores do app + destaque do timbrado)
     A cor de destaque também é definida no objeto EMPRESA (JS).
     ========================================================= */
      :root {
        --ink: #1c2024;
        --muted: #5b6470;
        --line: #e3e6e9;
        --bg: #eceeec;
        --panel: #ffffff;
        --accent: #0e6b63; /* sobrescrito por EMPRESA.corDestaque */
        --accent-soft: #e7f1f0;
        --radius: 12px;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.06);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        line-height: 1.45;
      }

      /* ---------- LAYOUT ---------- */
      .shell {
        display: grid;
        grid-template-columns: minmax(380px, 440px) 1fr;
        gap: 0;
        min-height: 100vh;
      }
      .editor {
        padding: 22px 22px 120px;
        overflow-y: auto;
        border-right: 1px solid var(--line);
        background: #f6f7f6;
      }
      .preview-wrap {
        padding: 28px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: radial-gradient(
          circle at 1px 1px,
          rgba(0, 0, 0, 0.05) 1px,
          transparent 0
        );
        background-size: 22px 22px;
        overflow: auto;
      }

      /* ---------- EDITOR ---------- */
      .brandline {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }
      .brandline .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }
      .brandline h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 650;
        letter-spacing: 0.2px;
      }
      .brandline span {
        font-size: 12px;
        color: var(--muted);
      }

      details.group {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      details.group > summary {
        list-style: none;
        cursor: pointer;
        padding: 13px 15px;
        font-weight: 600;
        font-size: 13.5px;
        display: flex;
        align-items: center;
        gap: 9px;
        user-select: none;
      }
      details.group > summary::-webkit-details-marker {
        display: none;
      }
      details.group > summary .chev {
        margin-left: auto;
        color: var(--muted);
        transition: transform 0.18s;
        font-size: 12px;
      }
      details.group[open] > summary .chev {
        transform: rotate(90deg);
      }
      details.group > summary .ico {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: var(--accent-soft);
        color: var(--accent);
        display: grid;
        place-items: center;
        font-size: 13px;
        flex: none;
      }
      .group-body {
        padding: 4px 15px 16px;
      }

      .field {
        margin-bottom: 11px;
      }
      .field:last-child {
        margin-bottom: 0;
      }
      label.lbl {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 5px;
        font-weight: 500;
      }
      input[type="text"],
      input[type="tel"],
      input[type="email"],
      input[type="number"],
      textarea,
      input.in {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 9px;
        font-size: 14px;
        font-family: inherit;
        color: var(--ink);
        background: #fff;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      textarea {
        resize: vertical;
        min-height: 62px;
        line-height: 1.4;
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .row3 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      /* itens */
      .item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
        margin-bottom: 9px;
        background: #fcfcfb;
      }
      .item .top {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .item .top .desc {
        flex: 1;
      }
      .item .nums {
        display: grid;
        grid-template-columns: 1fr 1fr 84px;
        gap: 8px;
        margin-top: 8px;
        align-items: end;
      }
      .item .nums .calc {
        font-size: 13px;
        font-weight: 600;
        text-align: right;
        color: var(--ink);
        padding-bottom: 9px;
        white-space: nowrap;
      }
      .btn-x {
        flex: none;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
      }
      .btn-x:hover {
        border-color: #e0a0a0;
        color: #c0392b;
        background: #fdf2f2;
      }
      .item-serv {
        border-left: 3px solid var(--accent);
      }
      .tag-serv {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--accent);
        background: var(--accent-soft);
        border-radius: 5px;
        padding: 2px 7px;
        margin-bottom: 6px;
      }
      .nums-serv {
        grid-template-columns: 1fr 100px !important;
      }
      .add-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 600;
        padding: 10px 14px;
        font-family: inherit;
        transition:
          filter 0.15s,
          transform 0.05s;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-ghost {
        background: var(--accent-soft);
        color: var(--accent);
        width: 100%;
      }
      .btn-ghost:hover {
        filter: brightness(0.97);
      }
      .btn-soft {
        background: #eef0ef;
        color: var(--muted);
        border: 1px solid var(--line);
      }

      .logo-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .logo-prev {
        width: 54px;
        height: 54px;
        border-radius: 9px;
        border: 1px dashed var(--line);
        display: grid;
        place-items: center;
        overflow: hidden;
        flex: none;
        background: #fff;
        font-size: 10px;
        color: var(--muted);
        text-align: center;
        padding: 4px;
      }
      .logo-prev img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .file-btn {
        flex: 1;
      }
      .file-btn input {
        display: none;
      }
      .colorpick {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .colorpick input[type="color"] {
        width: 42px;
        height: 34px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }

      /* barra de ação fixa */
      .actionbar {
        position: fixed;
        left: 0;
        bottom: 0;
        width: minmax(380px, 440px);
        width: clamp(380px, 34vw, 440px);
        background: rgba(246, 247, 246, 0.92);
        backdrop-filter: blur(8px);
        border-top: 1px solid var(--line);
        border-right: 1px solid var(--line);
        padding: 13px 22px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        z-index: 20;
      }
      .actionbar .btn-pdf {
        background: var(--accent);
        color: #fff;
        width: 100%;
        font-size: 15px;
        padding: 13px;
      }
      .actionbar .btn-pdf:hover {
        filter: brightness(1.06);
      }
      .hint {
        font-size: 11.5px;
        color: var(--muted);
        text-align: center;
        line-height: 1.35;
      }
      .toprow {
        display: flex;
        gap: 8px;
      }
      .toprow .btn {
        flex: 1;
      }

      /* ====================================================
     FOLHA A4 (a prévia e o que vai pro PDF)
     ==================================================== */
      .sheet-scaler {
        transform-origin: top center;
      }
      .sheet {
        width: 210mm;
        min-height: 297mm;
        background: #fff;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.13);
        padding: 15mm 16mm;
        color: #222;
        font-size: 11pt;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .doc-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--accent);
      }
      .doc-head .logo {
        max-height: 74px;
        max-width: 240px;
        object-fit: contain;
      }
      .doc-head .mono {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24pt;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        letter-spacing: 0.5px;
      }
      .doc-head .emp-nome {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 16pt;
        font-weight: 700;
        color: #1c2024;
        margin: 0 0 3px;
      }
      .doc-head .emp-slogan {
        font-size: 9pt;
        color: #666;
        font-style: italic;
        margin: 0 0 5px;
      }
      .doc-head .emp-info {
        font-size: 9pt;
        color: #555;
        line-height: 1.5;
        text-align: right;
      }
      .doc-head .right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        text-align: right;
      }

      .doc-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin: 16px 0 4px;
      }
      .doc-title h2 {
        font-size: 15pt;
        margin: 0;
        letter-spacing: 2px;
        font-weight: 700;
        color: #1c2024;
      }
      .doc-title .meta {
        font-size: 9.5pt;
        color: #555;
        text-align: right;
        line-height: 1.6;
      }
      .doc-title .meta b {
        color: #1c2024;
      }

      .cliente {
        background: #f7f8f8;
        border: 1px solid #ececec;
        border-radius: 8px;
        padding: 9px 12px;
        margin: 12px 0 4px;
        font-size: 10pt;
      }
      .cliente .ctag {
        font-size: 8pt;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 2px;
      }
      .cliente .cdados {
        color: #333;
      }
      .cliente .cdados b {
        color: #1c2024;
      }

      table.items {
        width: 100%;
        border-collapse: collapse;
        margin-top: 14px;
        font-size: 10pt;
      }
      table.items thead th {
        background: var(--accent);
        color: #fff;
        text-align: left;
        padding: 8px 10px;
        font-size: 8.5pt;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
      }
      table.items thead th.num {
        text-align: right;
      }
      table.items tbody td {
        padding: 9px 10px;
        border-bottom: 1px solid #ececec;
        vertical-align: top;
      }
      table.items tbody td.num {
        text-align: right;
        white-space: nowrap;
      }
      table.items tbody tr:nth-child(even) {
        background: #fafbfb;
      }
      table.items .desc-main {
        font-weight: 500;
        color: #1c2024;
      }
      table.items .row-tag {
        display: inline-block;
        font-size: 6.5pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #fff;
        background: var(--accent);
        border-radius: 4px;
        padding: 1px 5px;
        margin-right: 6px;
        vertical-align: middle;
      }

      .totais {
        display: flex;
        justify-content: flex-end;
        margin-top: 12px;
      }
      .totais .box {
        min-width: 230px;
        font-size: 10pt;
      }
      .totais .line {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        color: #444;
      }
      .totais .grand {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 6px;
        padding: 9px 12px;
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        font-size: 12.5pt;
        font-weight: 700;
      }

      .cond {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 18px;
        font-size: 9.5pt;
      }
      .cond .blk .h {
        font-size: 8pt;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 3px;
      }
      .cond .blk .t {
        color: #333;
        white-space: pre-wrap;
      }
      .obs {
        margin-top: 14px;
        font-size: 9.5pt;
      }
      .obs .h {
        font-size: 8pt;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 3px;
      }
      .obs .t {
        color: #333;
        white-space: pre-wrap;
      }

      .doc-tail {
        margin-top: auto;
      }
      .assina {
        padding-top: 30px;
        text-align: center;
      }
      .assina .l {
        width: 230px;
        border-top: 1px solid #999;
        margin: 0 auto 4px;
      }
      .assina .n {
        font-size: 10pt;
        font-weight: 600;
        color: #1c2024;
      }
      .assina .r {
        font-size: 8.5pt;
        color: #777;
      }

      .doc-foot {
        margin-top: 18px;
        padding-top: 8px;
        border-top: 1px solid #ececec;
        font-size: 8pt;
        color: #888;
        text-align: center;
        line-height: 1.5;
      }

      .empty-hint {
        color: #bbb;
      }

      /* tabela-envelope: o timbrado (thead) repete no topo de cada página impressa */
      table.page {
        width: 100%;
        border-collapse: collapse;
      }
      table.page > thead {
        display: table-header-group;
      }
      table.page > thead > tr > td.hcell {
        padding: 0 0 8px;
        border: none;
      }
      table.page > tbody > tr > td.bcell {
        padding: 0;
        border: none;
      }

      /* ---------- RESPONSIVO ---------- */
      @media (max-width: 880px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .editor {
          border-right: none;
          padding-bottom: 150px;
        }
        .preview-wrap {
          border-top: 1px solid var(--line);
          padding: 18px 10px 40px;
        }
        .actionbar {
          width: 100%;
          border-right: none;
        }
      }

      /* ---------- IMPRESSÃO / PDF ---------- */
      @media print {
        body {
          background: #fff;
        }
        body,
        .sheet,
        .sheet * {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        .editor,
        .actionbar,
        .preview-wrap {
          all: unset;
        }
        .editor,
        .actionbar {
          display: none !important;
        }
        .shell {
          display: block;
        }
        .preview-wrap {
          display: block;
          padding: 0;
          background: none;
          overflow: visible;
        }
        .sheet-scaler {
          transform: none !important;
        }
        .sheet {
          box-shadow: none;
          margin: 0;
          width: auto;
          min-height: auto;
          padding: 0;
          display: block;
        }
        .doc-tail {
          margin-top: 24px;
        }
        table.page > thead {
          display: table-header-group;
        }
        table.items {
          break-inside: auto;
        }
        table.items thead {
          display: table-header-group;
        }
        table.items tr {
          break-inside: avoid;
        }
        .doc-tail,
        .totais,
        .cond,
        .obs,
        .assina,
        .doc-foot {
          break-inside: avoid;
        }
        @page {
          size: A4;
          margin: 14mm 15mm;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- ================= EDITOR ================= -->
      <div class="editor">
        <div class="brandline">
          <span class="dot"></span>
          <h1>Orçamento</h1>
          <span>· preencha e gere o PDF</span>
        </div>

        <!-- ORÇAMENTO -->
        <details class="group" open>
          <summary>
            <span class="ico">№</span> Orçamento <span class="chev">›</span>
          </summary>
          <div class="group-body">
            <div class="row3">
              <div class="field">
                <label class="lbl">Número</label
                ><input class="in" id="orcNum" type="text" value="001" />
              </div>
              <div class="field">
                <label class="lbl">Validade</label
                ><input class="in" id="orcVal" type="text" value="7 dias" />
              </div>
            </div>
            <div class="field">
              <label class="lbl">Data</label
              ><input class="in" id="orcData" type="text" />
            </div>
          </div>
        </details>

        <!-- CLIENTE -->
        <details class="group" open>
          <summary>
            <span class="ico">☻</span> Cliente <span class="chev">›</span>
          </summary>
          <div class="group-body">
            <div class="field">
              <label class="lbl">Nome do cliente</label
              ><input
                class="in"
                id="cliNome"
                type="text"
                placeholder="Ex.: João da Silva"
              />
            </div>
            <div class="row2">
              <div class="field">
                <label class="lbl">Telefone</label
                ><input class="in" id="cliTel" type="text" />
              </div>
              <div class="field">
                <label class="lbl">Cidade / obra</label
                ><input class="in" id="cliLocal" type="text" />
              </div>
            </div>
          </div>
        </details>

        <!-- ITENS -->
        <details class="group" open>
          <summary>
            <span class="ico">≡</span> Itens <span class="chev">›</span>
          </summary>
          <div class="group-body">
            <div id="itens"></div>
            <div class="add-row">
              <button class="btn btn-ghost" id="addProd">+ Produto</button>
              <button class="btn btn-ghost" id="addServ">+ Serviço</button>
            </div>
          </div>
        </details>

        <!-- VALORES E CONDIÇÕES -->
        <details class="group">
          <summary>
            <span class="ico">$</span> Valores e condições
            <span class="chev">›</span>
          </summary>
          <div class="group-body">
            <div class="field">
              <label class="lbl">Desconto (R$)</label
              ><input
                class="in"
                id="orcDesc"
                type="text"
                inputmode="decimal"
                placeholder="0,00"
              />
            </div>
            <div class="field">
              <label class="lbl">Condições de pagamento</label
              ><textarea
                id="condPag"
                placeholder="Ex.: 50% na entrada, 50% na entrega. Pix, cartão ou dinheiro."
              ></textarea>
            </div>
            <div class="field">
              <label class="lbl">Prazo de entrega / execução</label
              ><input
                class="in"
                id="condPrazo"
                type="text"
                placeholder="Ex.: 5 dias úteis"
              />
            </div>
            <div class="field">
              <label class="lbl">Observações</label
              ><textarea
                id="obs"
                placeholder="Informações extras que aparecem no orçamento."
              ></textarea>
            </div>
            <div class="field">
              <label class="lbl">Responsável (assinatura)</label
              ><input
                class="in"
                id="resp"
                type="text"
                placeholder="Nome de quem assina"
              />
            </div>
          </div>
        </details>

        <div class="toprow">
          <button class="btn btn-soft" id="btnNovo">Novo orçamento</button>
        </div>
      </div>

      <!-- ================= PRÉVIA / FOLHA ================= -->
      <div class="preview-wrap">
        <div class="sheet-scaler" id="scaler">
          <div class="sheet" id="folha"></div>
        </div>
      </div>
    </div>

    <!-- ================= BARRA DE AÇÃO ================= -->
    <div class="actionbar">
      <button class="btn btn-pdf" onclick="window.print()">⬇ Gerar PDF</button>
      <div class="hint">
        No computador: escolha <b>“Salvar como PDF”</b> no destino da
        impressão.<br />
        No celular: toque em <b>Imprimir → Salvar como PDF</b> e depois
        compartilhe no WhatsApp.
      </div>
    </div>

    <script>
      /* =========================================================
   1) DADOS DA EMPRESA  —  EDITE AQUI para a versão final.
   Depois de batido aqui, o amigo nunca mais precisa mexer:
   é só preencher o orçamento e gerar o PDF.
   Para o logo, cole uma imagem em base64 em "logo"
   (data:image/png;base64,....) ou deixe vazio para usar a inicial.
   ========================================================= */
      const EMPRESA = {
        nome: "Climax",
        slogan: "Soluções elétricas · Energia solar · Climatização",
        documento: "CNPJ 38.305.166/0001-99", // <-- PREENCHA
        endereco:

      /* ---------- estado ---------- */
      const state = { emp: { ...EMPRESA }, itens: [] };

      /* ---------- helpers de dinheiro (pt-BR) ---------- */
      function parseNum(v) {
        if (v == null) return 0;
        let s = String(v).trim().replace(/\s/g, "");
        if (!s) return 0;
        if (s.indexOf(".") > -1 && s.indexOf(",") > -1)
          s = s.replace(/\./g, "").replace(",", ".");
        else if (s.indexOf(",") > -1) s = s.replace(",", ".");
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      }
      const BRL = new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL",
      });
      const fmt = (n) => BRL.format(n || 0);

      /* ---------- máscara de telefone (xx) x xxxx-xxxx ---------- */
      function maskPhone(value) {
        let d = String(value || "")
          .replace(/\D/g, "")
          .slice(0, 11);
        const n = d.length;
        if (n === 0) return "";
        if (n < 3) return "(" + d;
        if (n < 7) return "(" + d.slice(0, 2) + ") " + d.slice(2);
        if (n < 11)
          return "(" + d.slice(0, 2) + ") " + d.slice(2, 6) + "-" + d.slice(6); // fixo: (xx) xxxx-xxxx
        return (
          "(" +
          d.slice(0, 2) +
          ") " +
          d.slice(2, 3) +
          " " +
          d.slice(3, 7) +
          "-" +
          d.slice(7)
        ); // celular: (xx) x xxxx-xxxx
      }

      /* ---------- itens ---------- */
      function novoItem(tipo) {
        return tipo === "servico"
          ? { tipo: "servico", desc: "", valor: "" }
          : { tipo: "produto", desc: "", qtd: "", unit: "" };
      }
      function lineTotal(it) {
        return it.tipo === "servico"
          ? parseNum(it.valor)
          : parseNum(it.qtd) * parseNum(it.unit);
      }
      function addItem(tipo) {
        state.itens.push(novoItem(tipo));
        renderItens();
        render();
      }
      function removeItem(i) {
        state.itens.splice(i, 1);
        if (state.itens.length === 0) state.itens.push(novoItem());
        renderItens();
        render();
      }

      function renderItens() {
        const box = document.getElementById("itens");
        box.innerHTML = "";
        state.itens.forEach((it, i) => {
          const el = document.createElement("div");
          if (it.tipo === "servico") {
            el.className = "item item-serv";
            el.innerHTML = `
        <div class="top">
          <div class="desc">
            <span class="tag-serv">${escH(state.emp.rotuloServico || "Serviço")}</span>
            <input class="in" placeholder="Descreva o serviço (ex.: Pintura completa da sala)" data-k="desc" data-i="${i}" value="${esc(it.desc)}">
          </div>
          <button class="btn-x" data-rm="${i}" title="Remover">×</button>
        </div>
        <div class="nums nums-serv">
          <div><label class="lbl">Valor do serviço (R$)</label><input class="in" inputmode="decimal" placeholder="0,00" data-k="valor" data-i="${i}" value="${esc(it.valor)}"></div>
          <div class="calc">${fmt(parseNum(it.valor))}</div>
        </div>`;
          } else {
            el.className = "item";
            el.innerHTML = `
        <div class="top">
          <div class="desc"><input class="in" placeholder="Descrição do produto" data-k="desc" data-i="${i}" value="${esc(it.desc)}"></div>
          <button class="btn-x" data-rm="${i}" title="Remover">×</button>
        </div>
        <div class="nums">
          <div><label class="lbl">Qtde.</label><input class="in" inputmode="decimal" placeholder="1" data-k="qtd" data-i="${i}" value="${esc(it.qtd)}"></div>
          <div><label class="lbl">Valor unit. (R$)</label><input class="in" inputmode="decimal" placeholder="0,00" data-k="unit" data-i="${i}" value="${esc(it.unit)}"></div>
          <div class="calc">${fmt(parseNum(it.qtd) * parseNum(it.unit))}</div>
        </div>`;
          }
          box.appendChild(el);
        });
        box.querySelectorAll("input[data-k]").forEach((inp) => {
          inp.addEventListener("input", (e) => {
            const i = +e.target.dataset.i,
              k = e.target.dataset.k;
            state.itens[i][k] = e.target.value;
            // atualiza só o subtotal da linha sem recriar inputs (não perde foco)
            const calc = e.target.closest(".item").querySelector(".calc");
            const it = state.itens[i];
            calc.textContent = fmt(lineTotal(it));
            render();
          });
        });
        box.querySelectorAll("[data-rm]").forEach((b) => {
          b.addEventListener("click", () => removeItem(+b.dataset.rm));
        });
      }
      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }
      function escH(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ---------- ler campos simples ---------- */
      function val(id) {
        const e = document.getElementById(id);
        return e ? e.value : "";
      }

      /* ---------- render da FOLHA (prévia = PDF) ---------- */
      function render() {
        const e = state.emp;
        document.documentElement.style.setProperty(
          "--accent",
          e.corDestaque || "#0e6b63",
        );

        // totais
        let subtotal = 0;
        state.itens.forEach((it) => (subtotal += lineTotal(it)));
        const desc = parseNum(val("orcDesc"));
        const total = Math.max(0, subtotal - desc);

        // cabeçalho/logo
        const logoHTML = e.logo
          ? `<img class="logo" src="${e.logo}" alt="logo">`
          : `<div class="mono">${escH((e.nome || "?").trim().charAt(0).toUpperCase())}</div>`;

        // linhas de itens (produtos e serviços)
        const comConteudo = state.itens.filter((it) =>
          it.tipo === "servico"
            ? it.desc || it.valor
            : it.desc || it.qtd || it.unit,
        );
        const hasProd = comConteudo.some((it) => it.tipo !== "servico");
        const colCount = hasProd ? 4 : 2;
        const rotServ = escH(state.emp.rotuloServico || "Serviço");
        let rows = "";
        if (comConteudo.length) {
          comConteudo.forEach((it) => {
            const total = lineTotal(it);
            if (it.tipo === "servico") {
              const tag = `<span class="row-tag">${rotServ}</span>`;
              rows += hasProd
                ? `<tr><td class="desc-main">${tag}${escH(it.desc) || "—"}</td><td class="num">—</td><td class="num">—</td><td class="num">${fmt(total)}</td></tr>`
                : `<tr><td class="desc-main">${tag}${escH(it.desc) || "—"}</td><td class="num">${fmt(total)}</td></tr>`;
            } else {
              const q = it.qtd ? escH(it.qtd) : "1";
              rows += `<tr><td class="desc-main">${escH(it.desc) || "—"}</td><td class="num">${q}</td><td class="num">${fmt(parseNum(it.unit))}</td><td class="num">${fmt(total)}</td></tr>`;
            }
          });
        } else {
          rows = `<tr><td colspan="${colCount}" class="empty-hint" style="text-align:center;padding:18px;">Adicione produtos ou serviços…</td></tr>`;
        }
        const thead = hasProd
          ? `<tr><th>Descrição</th><th class="num">Qtde.</th><th class="num">Valor unit.</th><th class="num">Subtotal</th></tr>`
          : `<tr><th>Descrição</th><th class="num">Valor</th></tr>`;

        const cli = val("cliNome"),
          cliTel = val("cliTel"),
          cliLocal = val("cliLocal");
        const cliLinha = [cliTel, cliLocal].filter(Boolean).join(" · ");

        const condPag = val("condPag"),
          condPrazo = val("condPrazo"),
          obs = val("obs");
        const resp = val("resp") || e.assin;

        const empInfo = [
          e.documento,
          e.endereco,
          [e.telefone, e.email].filter(Boolean).join("  ·  "),
        ]
          .filter(Boolean)
          .map(escH)
          .join("<br>");

        document.getElementById("folha").innerHTML = `
    <table class="page"><thead><tr><td class="hcell">
    <div class="doc-head">
      <div class="left">${logoHTML}</div>
      <div class="right">
        <p class="emp-nome">${escH(e.nome)}</p>
        ${e.slogan ? `<div class="emp-slogan">${escH(e.slogan)}</div>` : ""}
        <div class="emp-info">${empInfo}</div>
      </div>
    </div>
    </td></tr></thead><tbody><tr><td class="bcell">

    <div class="doc-title">
      <h2>ORÇAMENTO</h2>
      <div class="meta">
        Nº <b>${escH(val("orcNum")) || "—"}</b><br>
        Data: <b>${escH(val("orcData"))}</b><br>
        Validade: ${escH(val("orcVal")) || "—"}
      </div>
    </div>

    <div class="cliente">
      <div class="ctag">Cliente</div>
      <div class="cdados"><b>${escH(cli) || "—"}</b>${cliLinha ? "<br>" + escH(cliLinha) : ""}</div>
    </div>

    <table class="items">
      <thead>${thead}</thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="doc-tail">
    <div class="totais"><div class="box">
      <div class="line"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
      ${desc > 0 ? `<div class="line"><span>Desconto</span><span>- ${fmt(desc)}</span></div>` : ""}
      <div class="grand"><span>TOTAL</span><span>${fmt(total)}</span></div>
    </div></div>

    ${
      condPag || condPrazo
        ? `<div class="cond">
      ${condPag ? `<div class="blk"><div class="h">Pagamento</div><div class="t">${escH(condPag)}</div></div>` : "<div></div>"}
      ${condPrazo ? `<div class="blk"><div class="h">Prazo</div><div class="t">${escH(condPrazo)}</div></div>` : ""}
    </div>`
        : ""
    }

    ${obs ? `<div class="obs"><div class="h">Observações</div><div class="t">${escH(obs)}</div></div>` : ""}

    <div class="assina">
      <div class="l"></div>
      <div class="n">${escH(resp)}</div>
      <div class="r">${escH(e.nome)}</div>
    </div>

    <div class="doc-foot">
      ${escH(e.nome)} · ${escH(e.documento)} · ${escH(e.telefone)} ${e.email ? "· " + escH(e.email) : ""}
    </div>
    </div>
    </td></tr></tbody></table>
  `;
        fitScale();
      }

      /* ---------- escala da prévia para caber na tela ---------- */
      function fitScale() {
        const wrap = document.querySelector(".preview-wrap");
        const scaler = document.getElementById("scaler");
        const sheet = document.getElementById("folha");
        if (!wrap || !sheet) return;
        scaler.style.transform = "none";
        const avail = wrap.clientWidth - 2; // largura disponível
        const w = sheet.offsetWidth; // 210mm em px
        const scale = Math.min(1, avail / w);
        scaler.style.transform = `scale(${scale})`;
        // ajusta a altura ocupada pelo elemento escalado
        scaler.style.height = sheet.offsetHeight * scale + "px";
      }
      window.addEventListener("resize", fitScale);

      /* ---------- bindings ---------- */
      function bindEmpresa() {
        // painel opcional: se os campos não existirem, os dados ficam fixos em EMPRESA
        const map = {
          empNome: "nome",
          empDoc: "documento",
          empEnd: "endereco",
          empTel: "telefone",
          empMail: "email",
          empCor: "corDestaque",
          empRotulo: "rotuloServico",
        };
        for (const id in map) {
          const el = document.getElementById(id);
          if (!el) continue;
          el.value = state.emp[map[id]] || "";
          el.addEventListener("input", () => {
            if (map[id] === "telefone") el.value = maskPhone(el.value);
            state.emp[map[id]] = el.value;
            render();
          });
        }
        const lf = document.getElementById("logoFile");
        if (lf)
          lf.addEventListener("change", (ev) => {
            const f = ev.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = () => {
              state.emp.logo = r.result;
              const p = document.getElementById("logoPrev");
              if (p) p.innerHTML = `<img src="${r.result}" alt="logo">`;
              render();
            };
            r.readAsDataURL(f);
          });
      }
      function bindCampos() {
        [
          "orcNum",
          "orcVal",
          "orcData",
          "cliNome",
          "cliTel",
          "cliLocal",
          "orcDesc",
          "condPag",
          "condPrazo",
          "obs",
          "resp",
        ].forEach((id) =>
          document.getElementById(id).addEventListener("input", (e) => {
            if (id === "cliTel") e.target.value = maskPhone(e.target.value);
            render();
          }),
        );
      }
      function novoOrcamento() {
        if (!confirm("Limpar e começar um novo orçamento?")) return;
        [
          "orcNum",
          "cliNome",
          "cliTel",
          "cliLocal",
          "orcDesc",
          "condPag",
          "condPrazo",
          "obs",
          "resp",
        ].forEach((id) => (document.getElementById(id).value = ""));
        document.getElementById("orcNum").value = "001";
        state.itens = [novoItem("produto")];
        setHoje();
        renderItens();
        render();
      }
      function setHoje() {
        const d = new Date();
        document.getElementById("orcData").value = d.toLocaleDateString(
          "pt-BR",
          { day: "2-digit", month: "long", year: "numeric" },
        );
      }

      /* ---------- init ---------- */
      function init() {
        const _lp = document.getElementById("logoPrev");
        if (_lp && state.emp.logo) {
          _lp.innerHTML = `<img src="${state.emp.logo}" alt="logo">`;
        }
        bindEmpresa();
        bindCampos();
        const _ec = document.getElementById("empCor");
        if (_ec) _ec.value = state.emp.corDestaque || "#0e6b63";
        const _er = document.getElementById("empRotulo");
        if (_er) {
          _er.value = state.emp.rotuloServico || "";
          _er.addEventListener("input", renderItens);
        }
        document
          .getElementById("addProd")
          .addEventListener("click", () => addItem("produto"));
        document
          .getElementById("addServ")
          .addEventListener("click", () => addItem("servico"));
        document
          .getElementById("btnNovo")
          .addEventListener("click", novoOrcamento);
        state.itens = [novoItem("produto")];
        setHoje();
        renderItens();
        render();
      }
      init();
    </script>
  </body>
</html>
